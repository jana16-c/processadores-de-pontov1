<body>
<header>
  <h1>Processador de ponto (com espera na jornada) - Fertran</h1>
</header>

<div class="wrap">
  <section class="card">
    <div class="section">
      <div>
          <label>Upload de TXT (opcional)</label>
          <input type="file" id="txtFile" accept=".txt,text/plain" />
          <label style="margin-top:12px;">Cole aqui o texto copiado do PDF</label>
          <textarea id="raw" placeholder="Cole o texto completo do relatório aqui..."></textarea>
          <div class="row" style="margin-top:12px;">
            <button class="btn" id="btnProcess" type="button">Processar texto</button>
            <button class="btn secondary" id="btnClear" type="button">Limpar tudo</button>
            <div class="loader" id="loader"></div>
            <div class="pill" id="pillReady">Pronto!</div>
            <div class="status" id="status"></div>
          </div>
          <textarea id="nomes" style="display:none"></textarea>
      </div>
    </div>

    <div class="section out" id="out"></div>
  </section>
</div>

<script>
/*
Processador de ponto — D'Granel (v14)
-----------------------------------
Mudança solicitada: entrada por TEXTO colado do PDF ou upload de .TXT.

Heurísticas/regex principais (baseadas no modelo anexado):
1) Nome:
   - "Funcionário / Motorista: ARNALDO DE PAULA DOS SANTOS 9 95887277"
   Regex: /Funcion[aá]rio\s*\/\s*Motorista:\s*([A-ZÁÉÍÓÚÂÊÔÃÕÇ ]+?)\s+\d/
   Limitação: se o PDF vier com nome quebrado em várias linhas ou com minúsculas, pode exigir ajuste.

2) Período (fechamento):
   - "Período: 01/08/2020 00:00:00 à 20/08/2020 23:59:59"
   Regex global: /Período:\s*(dd\/mm\/aaaa) ... à (dd\/mm\/aaaa) .../
   Fechamento = mês do SEGUNDO date (o "à ..."), como você descreveu.

3) Batidas:
   - Considera batida quando aparecer:
     "Função: Jornada de Trabalho Macro Mensagem: INICIO DE JORNADA"
   E usa o par Data/Hora Início + Data/Hora Final daquela mesma linha/registro.
   Ignora "Descanso", "Espera", "Refeição" (não geram batida).
   Observação: o texto do relatório já traz Início e Final no mesmo registro, então o pareamento é direto.

4) Fim de jornada:
   - Seu enunciado diz “a jornada termina quando tem Interjornada ou Pernoite”.
     Na prática do relatório, a linha de "Jornada de Trabalho" já contém o final (Data/Hora Final),
     e as linhas de "Interjornada/Pernoite" aparecem como registros à parte.
     Aqui, nós simplesmente NÃO usamos essas linhas como batida (porque não são Jornada),
     mas elas continuam no texto (não atrapalham).

5) Virada noturna (turno noturno):
   - Se "Jornada de Trabalho" começa em um dia e termina no dia seguinte,
     e a hora final (minutos do dia) fica MENOR que a hora inicial,
     então transformamos a saída em 24h + horaFinal (ex.: 02:10 -> 26:10),
     e atribuímos a batida ao dia inicial.

Limitações relevantes:
- Se o texto vier muito “poluído” (quebras/colunas diferentes), o regex do registro pode falhar.
- Não fazemos OCR aqui; é só texto (copiado do PDF ou .txt).
- Se o relatório tiver múltiplos formatos de "Função:" ou mensagens diferentes, pode precisar ampliar os padrões.
*/

const $ = (id) => document.getElementById(id);

const elRaw = $("raw");
const elTxtFile = $("txtFile");
const elNomes = $("nomes");
const elStatus = $("status");
const elLoader = $("loader");
const elPillReady = $("pillReady");
const elOut = $("out");
const btnProcess = $("btnProcess");
const btnClear = $("btnClear");

function setStatus(msg){ elStatus.textContent = msg || ""; }
function setLoading(on){
  elLoader.style.display = on ? "inline-block" : "none";
  btnProcess.disabled = on;
}
function flashReady(){
  elPillReady.style.display = "inline-block";
  setTimeout(()=>{ elPillReady.style.display = "none"; }, 2500);
}

function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }

function normalizeSpaces(s){
  return (s||"").replace(/\r\n/g,"\n").replace(/\r/g,"\n").replace(/[\t\f\v]+/g," ").replace(/ +/g," ");
}

function onlyHHMM(hhmmss){
  // "06:10:49" -> "06:10"
  const m = /^([0-9]{2}):([0-9]{2})/.exec(hhmmss || "");
  return m ? `${m[1]}:${m[2]}` : "";
}

function parseBRDate(dmy){
  // dd/mm/yyyy -> Date (local)
  const m = /^(\d{2})\/(\d{2})\/(\d{4})$/.exec(dmy);
  if(!m) return null;
  const dd = parseInt(m[1],10), mm = parseInt(m[2],10)-1, yy = parseInt(m[3],10);
  return new Date(yy, mm, dd);
}

function fmtBRDate(dt){
  const dd = String(dt.getDate()).padStart(2,"0");
  const mm = String(dt.getMonth()+1).padStart(2,"0");
  const yy = dt.getFullYear();
  return `${dd}/${mm}/${yy}`;
}

function addDays(dt, n){
  const d = new Date(dt.getTime());
  d.setDate(d.getDate()+n);
  return d;
}

function dayKey(dt){ return fmtBRDate(dt); }

function dowPT(dt){
  const d = dt.getDay(); // 0 dom
  return ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"][d];
}

function mondayOf(dt){
  const d = new Date(dt.getFullYear(), dt.getMonth(), dt.getDate());
  const day = d.getDay(); // 0=Dom,1=Seg...
  const diff = (day === 0 ? -6 : 1 - day); // voltar até segunda
  d.setDate(d.getDate() + diff);
  return d;
}

function isNextDay(d1, d2){
  const a = parseBRDate(d1), b = parseBRDate(d2);
  if(!a || !b) return false;
  const diff = Math.round((b - a) / 86400000);
  return diff === 1;
}

function toMinutes(hhmm){
  const m = /^(\d{2}):(\d{2})$/.exec(hhmm);
  if(!m) return null;
  return parseInt(m[1],10)*60 + parseInt(m[2],10);
}

function add24(hhmm){
  const m = /^(\d{2}):(\d{2})$/.exec(hhmm);
  if(!m) return hhmm;
  const hh = parseInt(m[1],10) + 24;
  return `${String(hh).padStart(2,"0")}:${m[2]}`;
}

function parseNameFilters(){
  // Filtro de nomes desabilitado — processa todos os funcionários encontrados
  return null;
}

function nameAllowed(name, filters){
  if(!filters) return true;
  const up = (name||"").toUpperCase();
  return filters.some(f => up.includes(f));
}

function splitByPeriods(text){
  // retorna [{periodStart, periodEnd, slice}]
  const re = /Per[ií]odo:\s*(\d{2}\/\d{2}\/\d{4})(?:\s+\d{2}:\d{2}:\d{2})?\s*(?:à|-)\s*(\d{2}\/\d{2}\/\d{4})(?:\s+\d{2}:\d{2}:\d{2})?/gi;
  const matches = [];
  let m;
  while((m = re.exec(text)) !== null){
    matches.push({ idx: m.index, start: m[1], end: m[2] });
  }
  const sections = [];
  for(let i=0;i<matches.length;i++){
    const a = matches[i];
    const b = matches[i+1];
    const slice = text.slice(a.idx, b ? b.idx : text.length);
    sections.push({ periodStart: a.start, periodEnd: a.end, slice });
  }
  // Se não encontrou nenhum Período, tratar o texto inteiro como uma seção
  // usando a primeira e última data encontradas no texto
  if(!sections.length){
    const dtRe = /\d{2}\/\d{2}\/\d{4}/g;
    const dates = [];
    let d;
    while((d = dtRe.exec(text)) !== null) dates.push(d[0]);
    const start = dates[0] || "01/01/2000";
    const end   = dates[dates.length-1] || start;
    sections.push({ periodStart: start, periodEnd: end, slice: text });
  }
  return sections;
}

function extractEmployeeName(slice){
  // tenta achar o primeiro "Funcionário:" após o período
  // O nome pode quebrar em múltiplas linhas (ex.: "ANTONIO DOS REIS RODRIGUES DA\nSILVA")
  const re = /Funcion[aá]rio(?:\s*\/\s*Motorista)?\s*:\s*([\s\S]+?)(?:\s*CPF\s*:|$)/mi;
  const m = re.exec(slice);
  if(m){
    // pegar só até a linha que tem CPF ou até 3 linhas de nome
    let raw = m[1].replace(/\r/g,"").trim();
    // remover tudo depois de um número de CPF ou após linha em branco
    raw = raw.replace(/\n\s*\n[\s\S]*/,"").replace(/\s*\d{11}\s*.*/,"");
    // juntar linhas do nome em uma só
    return raw.replace(/\n+/g," ").replace(/\s+/g," ").trim();
  }
  return "FUNCIONÁRIO";
}

function cleanSliceForParsing(s){
  return s
    .replace(/Pagina\s+\d+\s+de\s+\d+/gi, "")
    .replace(/Documento\s+assinado\s+eletronicamente[^\n]*/gi, "")
    .replace(/Fls\.?:\s*\d+/gi, "");
}

function extractJourneys(slice, periodStart, periodEnd){
  /*
    Parser robusto para dois formatos:
    FORMATO A: data e hora na mesma linha  (dd/mm/yyyy hh:mm:ss)
    FORMATO B: data e hora em linhas separadas (Fertran):
      dd/mm/yyyy
      hh:mm:ss  local  dd/mm/yyyy
      hh:mm:ss  local  placa
      Função X Tipo Y
    Estratégia:
    1) Limpar ruído de paginação/assinatura.
    2) Colapsar "dd/mm/yyyy\nhh:mm:ss" em "dd/mm/yyyy hh:mm:ss".
    3) Para cada "Função ... Tipo/Macro Mensagem", pegar os 2 últimos pares de data/hora antes dele.
  */
  const clean = cleanSliceForParsing(slice);
  const collapsed = clean.replace(
    /(\d{2}\/\d{2}\/\d{4})\s*\n\s*(\d{2}:\d{2}:\d{2})/g,
    "$1 $2"
  );

  const out = [];
  const funcRe = /Função:?\s*([^\n\r]+?)\s+(?:Macro\s+Mensagem:|Tipo)\s*:?\s*([^\n\r]+)/g;

  const pStart = parseBRDate(periodStart);
  const pEnd = parseBRDate(periodEnd);
  const rangeStart = pStart ? addDays(pStart, -35) : null;
  const rangeEnd = pEnd ? addDays(pEnd, 35) : null;

  let m;
  while((m = funcRe.exec(collapsed)) !== null){
    const func = (m[1]||"").trim();
    const msg  = (m[2]||"").trim();

    const idx = m.index;
    const back = collapsed.slice(Math.max(0, idx - 1200), idx);

    const dtRe = /(\d{2}\/\d{2}\/\d{4})\s+(\d{2}:\d{2}:\d{2})/g;
    const pairs = [];
    let d;
    while((d = dtRe.exec(back)) !== null){
      pairs.push({ date: d[1], time: d[2], idx: d.index });
    }
    if(pairs.length < 2) continue;

    let usePairs = pairs;
    if(rangeStart && rangeEnd){
      const filtered = pairs.filter(p=>{
        const dt = parseBRDate(p.date);
        return dt && dt >= rangeStart && dt <= rangeEnd;
      });
      if(filtered.length >= 2) usePairs = filtered;
    }

    // Preferir pares bem próximos do "Função" (evita capturar datas residuais)
    const nearPairs = usePairs.filter(p => (back.length - p.idx) < 600);
    if(nearPairs.length >= 2) usePairs = nearPairs;

    const start = usePairs[usePairs.length - 2];
    const end   = usePairs[usePairs.length - 1];

    out.push({
      startDate: start.date,
      startTime: start.time,
      endDate: end.date,
      endTime: end.time,
      func, msg
    });
  }
  return out;
}

function buildDataModel(rawText){
  const text = normalizeSpaces(rawText).replace(/\n\s+\n/g,"\n\n");
  const sections = splitByPeriods(text);
  const filters = parseNameFilters();

  // estrutura: persons[name][refKey] => { periodStart, periodEnd, days: Map(dateStr => [times]) }
  const persons = new Map();

  for(const sec of sections){
    const name = extractEmployeeName(sec.slice);
    if(!nameAllowed(name, filters)) continue;

    const periodStart = sec.periodStart;
    const periodEnd = sec.periodEnd;

    if(!persons.has(name)) persons.set(name, new Map());
    const byRef = persons.get(name);

    // Cada batida vai para o refKey do seu próprio mês/ano.
    // Resolve relatórios com período longo (ex: 20/07 - 31/12) que têm múltiplos meses num bloco só.
    function getRefForDate(dateStr){
      const dt = parseBRDate(dateStr);
      if(!dt) return null;
      const rk = `${String(dt.getMonth()+1).padStart(2,"0")}/${dt.getFullYear()}`;
      if(!byRef.has(rk)){
        const ms = new Date(dt.getFullYear(), dt.getMonth(), 1);
        const me = new Date(dt.getFullYear(), dt.getMonth()+1, 0);
        byRef.set(rk, { refKey: rk, periodStart: fmtBRDate(ms), periodEnd: fmtBRDate(me), days: new Map() });
      }
      return byRef.get(rk);
    }

    const journeys = extractJourneys(sec.slice, periodStart, periodEnd);
    for(const j of journeys){
      
      const isJornada = /Jornada\s+de\s+Trabalho/i.test(j.func);
      const isEsperaWithinJornada = isJornada && /INICIO\s+DE\s+ESPERA/i.test(j.msg);
      const isEspera  = /Espera/i.test(j.func) || isEsperaWithinJornada;

      if(!isJornada && !isEspera) continue;

      const inHHMM = onlyHHMM(j.startTime);
      let outHHMM = onlyHHMM(j.endTime);

      // virada noturna (somente para Jornada)
      if(isJornada && j.startDate !== j.endDate && isNextDay(j.startDate, j.endDate)){
        const a = toMinutes(inHHMM);
        const b = toMinutes(outHHMM);
        if(a != null && b != null && b < a){
          outHHMM = add24(outHHMM);
        }
      }

      // regra de duração muito longa (somente se atravessar dia)
      const MAX_PAIR_MIN = 14 * 60;
      {
        const a = toMinutes(inHHMM);
        const b = toMinutes(outHHMM);
        if(a != null && b != null){
          let dur = b - a;
          const crossesDay = (String(j.startDate||"") !== String(j.endDate||""));
          if(dur < 0) dur += 24*60;
          if(crossesDay && dur > MAX_PAIR_MIN){
            continue;
          }
        }
      }

      // Batida vai para o refObj do mês real da batida
      const refObj = getRefForDate(j.startDate);
      if(!refObj) continue;

      const key = j.startDate;
      if(!refObj.days.has(key)) refObj.days.set(key, []);
      const arr = refObj.days.get(key);

      if(isJornada && !isEsperaWithinJornada){
        if(inHHMM) arr.push(inHHMM);
        if(outHHMM) arr.push(outHHMM);
      }

      // Se for Espera e houver jornada anterior no mesmo dia, cola a saída
      if(isEspera && arr.length >= 2){
        const lastIndex = arr.length - 1;
        const lastOut = arr[lastIndex];
        if(lastOut === inHHMM){
          arr[lastIndex] = outHHMM;
        }
      }
    }

    // Pós-processamento em todos os refs deste funcionário
    for(const refObj of byRef.values()){
      for(const [d, arr] of refObj.days.entries()){
        if(!arr || arr.length < 2) continue;
        for(let i=0; i < arr.length - 1; ){
          if(arr[i] && arr[i] === arr[i+1]){ arr.splice(i, 2); }
          else { i++; }
        }
        refObj.days.set(d, arr);
      }
      for(const [d, arr] of refObj.days.entries()){
        if(arr && arr.length === 2 && arr[0] === arr[1]){ refObj.days.set(d, []); }
      }
    }
  }

  // Converter Map -> objetos mais fáceis
  const result = [];
  for(const [name, refsMap] of persons.entries()){
    const refs = [];
    for(const [refKey, obj] of refsMap.entries()){
      refs.push(obj);
    }
    refs.sort((a,b)=>{
      const pa = /^(\d{2})\/(\d{4})$/.exec(a.refKey||"");
      const pb = /^(\d{2})\/(\d{4})$/.exec(b.refKey||"");
      const ya = pa ? parseInt(pa[2],10) : 9999;
      const yb = pb ? parseInt(pb[2],10) : 9999;
      const ma = pa ? parseInt(pa[1],10) : 99;
      const mb = pb ? parseInt(pb[1],10) : 99;
      if(ya !== yb) return ya - yb;
      return ma - mb;
    });
    result.push({ name, refs });
  }
  result.sort((a,b)=> a.name.localeCompare(b.name));
  return result;
}

function buildWeeks(periodStart, periodEnd){
  // Usa sempre do dia 1 ao último dia do mês do fechamento (periodEnd).
  // Semanas são Seg→Dom, mas são CORTADAS na fronteira do mês (não extrapolam).
  const endDt = parseBRDate(periodEnd);
  if(!endDt) return [];

  const year  = endDt.getFullYear();
  const month = endDt.getMonth(); // 0-based
  const firstDay = new Date(year, month, 1);
  const lastDay  = new Date(year, month + 1, 0); // último dia do mês

  const all = [];
  for(let d = new Date(firstDay.getTime()); d <= lastDay; d = addDays(d,1)){
    all.push(new Date(d.getTime()));
  }
  if(!all.length) return [];

  // weeks keyed by monday date, mas cada semana é limitada ao mês
  const weeks = new Map();
  for(const d of all){
    const mon = mondayOf(d);
    const k = mon.toISOString().slice(0,10);
    if(!weeks.has(k)) weeks.set(k, { mon, days: [] });
  }
  // preencher cada semana com dias Seg→Dom, mas cortados dentro do mês
  for(const w of weeks.values()){
    const days = [];
    for(let i=0;i<7;i++){
      const day = addDays(w.mon, i);
      if(day.getMonth() === month && day.getFullYear() === year){
        days.push(day);
      }
    }
    w.days = days;
  }
  // ordenar
  return Array.from(weeks.values()).sort((a,b)=> a.mon - b.mon);
}

function fmtExcelTime(hhmm){
  // Mantém exatamente como está no texto (HH:MM).
  return (hhmm||"");
}

function toTSVForWeek(weekDays, inRangeFn, dayToTimes, weekLabel){
  // Formato (TSV):
  // Linha 1: "Semana\t<dd/mm/aaaa a dd/mm/aaaa>"
  // Linhas seguintes: apenas batidas (sem Data/Dia e sem "Entrada1/Saída1").
  // Cada linha = um dia do período (Seg→Dom) com N colunas de horários (pares Entrada/Saída).
  //
  // Observações:
  // - Se faltar par, completa com vazio.
  // - Se tiver 1 batida só (ímpar), completa vazio.
  // - Mantemos colunas suficientes para a MAIOR linha da semana (para colar “retinho” no Excel).
  let maxCols = 0;
  const rows = [];

  for(const d of weekDays){
    if(!inRangeFn(d)) continue;
    const k = fmtBRDate(d);
    const times = (dayToTimes.get(k) || []).slice();

    // garantir pares
    if(times.length % 2 === 1) times.push("");

    maxCols = Math.max(maxCols, times.length);
    rows.push({ times });
  }

  const lines = [];
  if(weekLabel){
    lines.push(["Semana", weekLabel].join("\t"));
  }

  for(const r of rows){
    const line = [];
    for(let i=0;i<maxCols;i++){
      line.push(fmtExcelTime(r.times[i] || ""));
    }
    lines.push(line.join("\t"));
  }

  return lines.join("\n");
}

function render(model){
  elOut.innerHTML = "";
  if(!model.length){
    elOut.innerHTML = `<div class="section"><div class="muted">Nenhuma batida encontrada. Verifique se o texto contém registros no formato “Função Jornada de Trabalho Tipo ...”.</div></div>`;
    return;
  }

  const frag = document.createDocumentFragment();

  for(const person of model){
    const wrap = document.createElement("div");
    wrap.className = "person";
    wrap.innerHTML = `<h2>${escapeHtml(person.name)}</h2>`;

    for(const ref of person.refs){
      const refBox = document.createElement("div");
      refBox.className = "ref";

      const weeks = buildWeeks(ref.periodStart, ref.periodEnd);
      const endDt = parseBRDate(ref.periodEnd);
      const monthStart = endDt ? new Date(endDt.getFullYear(), endDt.getMonth(), 1) : null;
      const monthEnd   = endDt ? new Date(endDt.getFullYear(), endDt.getMonth()+1, 0) : null;
      const inRangeFn = (d)=> (monthStart && monthEnd && d>=monthStart && d<=monthEnd);

      const refHead = document.createElement("div");
      refHead.className = "refhead";
      refHead.innerHTML = `
        <div>
          <div style="font-weight:800;">Referência: ${escapeHtml(ref.refKey)}</div>
          <div class="meta">Período do relatório: ${escapeHtml(ref.periodStart)} → ${escapeHtml(ref.periodEnd)}</div>
        </div>
        <div class="meta">Semanas: ${weeks.filter(w=>w.days.length>0).length}</div>
      `;
      refBox.appendChild(refHead);

      const weeksWrap = document.createElement("div");
      weeksWrap.className = "weeks";

      for(const w of weeks){
        const visDays = w.days; // já limitados ao mês em buildWeeks
        if(!visDays.length) continue;

        const wk = document.createElement("div");
        wk.className = "week";

        const vStart = visDays[0];
        const vEnd = visDays[visDays.length-1];
        const title = `Semana ${fmtBRDate(vStart)} a ${fmtBRDate(vEnd)}`;

        const tsvCopy = toTSVForWeek(visDays, ()=>true, ref.days, null);

        const head = document.createElement("div");
        head.className = "weekhead";
        head.innerHTML = `
          <div class="weektitle">${escapeHtml(title)}</div>
          <button class="btn secondary" type="button">Copiar semana</button>
        `;
        const btn = head.querySelector("button");
        btn.addEventListener("click", async ()=>{
          await copyToClipboard(tsvCopy);
          setStatus("Copiado para a área de transferência (TSV com TAB). Cole direto no Excel.");
          const old = btn.textContent;
          btn.textContent = "Copiado";
          btn.disabled = true;
          window.setTimeout(()=>{
            btn.textContent = old;
            btn.disabled = false;
          }, 2500);
        });

        const table = document.createElement("table");
        table.className = "tbl";

        // calcula max colunas (para exibição) — somente batidas, sem Data/Dia e sem "Entrada1/Saída1"
        let maxCols = 0;
        for(const d of visDays){
          const times = (ref.days.get(fmtBRDate(d)) || []);
          maxCols = Math.max(maxCols, times.length + (times.length%2));
        }

        const tbody = document.createElement("tbody");

        for(const d of visDays){ // não mostra fora do período
          const dk = fmtBRDate(d);
          const times = (ref.days.get(dk) || []).slice();
          if(times.length % 2 === 1) times.push("");

          const tr = document.createElement("tr");
          for(let i=0;i<maxCols;i++){
            const td = document.createElement("td");
            td.className = "mono";
            td.textContent = fmtExcelTime(times[i] || "");
            tr.appendChild(td);
          }
          tbody.appendChild(tr);
        }
        table.appendChild(tbody);

        wk.appendChild(head);
        wk.appendChild(table);
        weeksWrap.appendChild(wk);
      }

      refBox.appendChild(weeksWrap);
      wrap.appendChild(refBox);
    }

    frag.appendChild(wrap);
  }

  elOut.appendChild(frag);
}

function escapeHtml(s){
  return String(s||"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

async function copyToClipboard(text){
  try{
    await navigator.clipboard.writeText(text);
  }catch(e){
    // fallback
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position="fixed";
    ta.style.left="-9999px";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
  }
}

function simulateProgress(msTotal=900){
  // progresso fake discreto (já que texto é instantâneo)
  let pct = 0;
  const start = performance.now();
  return new Promise(resolve=>{
    function tick(){
      const t = performance.now() - start;
      pct = Math.min(99, Math.floor((t/msTotal)*100));
      setStatus(`Carregando... ${pct}%`);
      if(t >= msTotal) return resolve();
      requestAnimationFrame(tick);
    }
    tick();
  });
}

btnProcess.addEventListener("click", async ()=>{
  const raw = (elRaw.value||"").trim();
  if(!raw){
    setStatus("Cole o texto (ou suba um .txt) antes de processar.");
    return;
  }

  setLoading(true);
  elOut.innerHTML = "";
  setStatus("Carregando... 0%");

  await simulateProgress(800);

  // processar
  let model = [];
  try{
    model = buildDataModel(raw);
  }catch(err){
    console.error(err);
    setStatus("Não consegui interpretar o texto. Se puder, envie mais um TXT/PDF de outro mês para eu ajustar as heurísticas.");
    setLoading(false);
    return;
  }

  setStatus("Carregando... 100%");
  render(model);
  setLoading(false);
  flashReady();
  setStatus("Processamento concluído. Use 'Copiar semana' e cole no Excel.");
});

btnClear.addEventListener("click", ()=>{
  elRaw.value = "";
  elTxtFile.value = "";
  elNomes.value = "";
  elOut.innerHTML = "";
  setStatus("");
});

elTxtFile.addEventListener("change", async (ev)=>{
  const f = ev.target.files && ev.target.files[0];
  if(!f) return;
  setLoading(true);
  setStatus("Carregando... 0%");
  const txt = await f.text();
  // manter quebras de linha (não normalizar aqui)
  elRaw.value = txt;
  setStatus("TXT carregado. Clique em 'Processar texto'.");
  setLoading(false);
  flashReady();
});
</script>
