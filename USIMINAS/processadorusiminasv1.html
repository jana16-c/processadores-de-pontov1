<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Processador de ponto — Usiminas</title>

    <style>
        :root{
            --bg:#0b1220;
            --card:#0f1a2e;
            --muted:#8aa0c2;
            --text:#e7eefc;
            --line:rgba(255,255,255,.10);
            --blue:#4aa3ff;
            --danger-bg:rgba(255,80,80,.10);
            --danger:#fecdd3;
            --success:#22c55e;
        }

        *{ box-sizing:border-box; }

        body{
            margin:0;
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background:
                radial-gradient(1200px 800px at 20% -10%, rgba(74,163,255,.20), transparent 60%),
                radial-gradient(900px 700px at 110% 10%, rgba(43,107,255,.16), transparent 55%),
                var(--bg);
            color:var(--text);
            padding:28px 18px 48px;
        }

        .container{
            width:100%;
            max-width:1100px;
            margin:0 auto;
        }

        header{
            margin-bottom:18px;
        }

        h1{
            margin:0 0 6px;
            font-size:22px;
            letter-spacing:.2px;
        }

        .sub{
            color:var(--muted);
            font-size:13px;
            line-height:1.35;
        }

        .card{
            background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
            border:1px solid var(--line);
            border-radius:16px;
            overflow:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,.25);
        }

        .section{
            padding:16px;
            border-top:1px solid var(--line);
        }

        .section:first-child{
            border-top:none;
        }

        label{
            display:block;
            color:var(--muted);
            font-size:12px;
            margin:0 0 8px;
        }

        textarea{
            width:100%;
            min-height:240px;
            resize:vertical;
            padding:12px;
            border-radius:12px;
            border:1px solid var(--line);
            background:rgba(0,0,0,.18);
            color:var(--text);
            outline:none;
            line-height:1.35;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            font-size:12.5px;
        }

        textarea:focus{
            border-color:rgba(74,163,255,.55);
            box-shadow:0 0 0 3px rgba(74,163,255,.14);
        }

        .row{
            display:flex;
            gap:10px;
            align-items:center;
            flex-wrap:wrap;
            margin-top:12px;
        }

        .btn-main,
        .btn-copy{
            appearance:none;
            border:1px solid var(--line);
            color:var(--text);
            padding:10px 12px;
            border-radius:12px;
            cursor:pointer;
            font-weight:600;
            transition:.15s;
        }

        .btn-main{
            background:rgba(74,163,255,.12);
        }

        .btn-main:hover,
        .btn-copy:hover{
            transform:translateY(-1px);
            border-color:rgba(74,163,255,.55);
        }

        .btn-copy{
            background:rgba(255,255,255,.06);
            font-size:12px;
        }

        .btn-copy.copied{
            background:rgba(34,197,94,.18);
            border-color:rgba(34,197,94,.55);
        }

        .error-msg{
            background:var(--danger-bg);
            color:var(--danger);
            padding:12px;
            border-radius:10px;
            margin-bottom:14px;
            display:none;
            font-size:13px;
            border:1px solid rgba(255,80,80,.18);
        }

        .result-block{
            border-top:1px solid var(--line);
            padding:16px;
        }

        .result-block:first-child{
            border-top:none;
        }

        .person-name{
            font-size:15px;
            font-weight:800;
            margin:0 0 10px;
        }

        .month-card{
            margin-top:12px;
            border:1px solid var(--line);
            border-radius:14px;
            overflow:hidden;
        }

        .card-header{
            padding:10px 12px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:10px;
            background:rgba(0,0,0,.16);
            border-bottom:1px solid var(--line);
        }

        .month-label{
            font-size:13px;
            font-weight:800;
            text-transform:capitalize;
        }

        .month-meta{
            color:var(--muted);
            font-size:12px;
            margin-top:2px;
        }

        .weeks{
            padding:10px 12px;
        }

        .week{
            border:1px solid var(--line);
            border-radius:14px;
            overflow:hidden;
            margin-bottom:10px;
        }

        .week:last-child{
            margin-bottom:0;
        }

        .weekhead{
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:10px;
            padding:10px 12px;
            background:rgba(255,255,255,.04);
            border-bottom:1px solid var(--line);
        }

        .weektitle{
            font-weight:800;
            font-size:13px;
        }

        .tbl{
            width:100%;
            border-collapse:collapse;
            font-size:12.5px;
        }

        .tbl td{
            border-bottom:1px solid rgba(255,255,255,.07);
            padding:8px 10px;
            vertical-align:top;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        }

        .tbl tr:last-child td{
            border-bottom:none;
        }

        .muted{
            color:var(--muted);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Processador de ponto - Usiminas</h1>
        <div class="sub">
            
        </div>
    </header>

    <div class="card">
        <div class="section">
            <div id="error-box" class="error-msg"></div>

            <label>Cole o texto copiado do espelho de ponto aqui :</label>
            <textarea id="raw-data" placeholder=""></textarea>

            <div class="row">
                <button id="btn-process" class="btn-main" onclick="processData()">Processar</button>
            </div>
        </div>

        <div id="results-area"></div>
    </div>
</div>

<script>
    /*
      Função principal acionada pelo botão "Processar".
      O que ela faz:
      1) lê o texto colado;
      2) chama o parser para montar os dados por funcionário;
      3) ordena os dias;
      4) aplica a lógica de ajuste de turnos;
      5) renderiza o resultado por mês e por semana.
    */
    function processData() {

    const btn = document.getElementById('btn-process');
    const originalText = btn.textContent;

    // muda texto e bloqueia botão
    btn.textContent = "Processando...";
    btn.disabled = true;

    const rawData = document.getElementById('raw-data').value;
    const output = document.getElementById('results-area');
    const errBox = document.getElementById('error-box');

    output.innerHTML = '';
    errBox.style.display = 'none';

    if (!rawData.trim()) {
        showError("Por favor, cole o texto do PDF.");
        
        // volta botão
        btn.textContent = originalText;
        btn.disabled = false;
        return;
    }

    try {
        const dataMap = parseInput(rawData);
        let found = false;

        Object.keys(dataMap).sort().forEach(name => {
            let timeline = dataMap[name] || [];
            if (!timeline.length) return;

            found = true;

            timeline.sort((a, b) => a.data - b.data);
            timeline = adjustShifts(timeline);

            renderPerson(name, timeline, output);
        });

        if (!found) {
            showError("Nenhum funcionário ou batida foi encontrado no texto.");
        }

    } catch (e) {
        console.error(e);
        showError("Erro ao processar.");
    }

    // comportamento igual ao botão copiar
    btn.textContent = "Processado!";
    btn.classList.add("copied");

    setTimeout(() => {
        btn.textContent = originalText;
        btn.classList.remove("copied");
        btn.disabled = false;
    }, 2000);
}

    /*
      Exibe uma mensagem de erro no topo do card.
    */
    function showError(msg) {
        const box = document.getElementById('error-box');
        box.innerText = msg;
        box.style.display = 'block';
    }

    /*
      Converte "HH:MM" ou "26:10" em minutos.
      É usada para ordenar horários, inclusive horários estendidos acima de 24h.
    */
    function toMin(str) {
        const [h, m] = str.split(':').map(Number);
        return h * 60 + m;
    }

    /*
      Formata uma data JS em dd/mm/aaaa.
      É usada para criar chaves de dias e para títulos de semanas.
    */
    function fmtBRDate(dt) {
        const dd = String(dt.getDate()).padStart(2, '0');
        const mm = String(dt.getMonth() + 1).padStart(2, '0');
        const yy = dt.getFullYear();
        return `${dd}/${mm}/${yy}`;
    }

    /*
      Soma N dias a uma data.
      É usada na construção das semanas.
    */
    function addDays(dt, n) {
        const d = new Date(dt.getTime());
        d.setDate(d.getDate() + n);
        return d;
    }

    /*
      Retorna a segunda-feira da semana da data informada.
      Se a data for domingo, volta 6 dias.
      Isso garante o padrão Seg→Dom.
    */
    function mondayOf(dt) {
        const d = new Date(dt.getFullYear(), dt.getMonth(), dt.getDate());
        const day = d.getDay(); // 0=Dom, 1=Seg...
        const diff = (day === 0 ? -6 : 1 - day);
        d.setDate(d.getDate() + diff);
        return d;
    }

    /*
  Faz o parsing bruto do texto copiado do PDF.
  O que ela identifica:
  - nome do funcionário;
  - período do relatório;
  - linhas de dias;
  - horários do dia.

  Correção importante:
  - agora o mês do dia é definido pelo período real do espelho;
  - se o período for 01/10 até 31/10, todos os dias 01..31 ficam em outubro;
  - se o período atravessar meses, a função distribui corretamente:
    por exemplo, 26..31 ficam no mês inicial e 01..05 no mês final.
*/
function parseInput(text) {
    const map = {};

    const normalizedText = text
        .replace(/\r/g, '')
        .replace(/\u00A0/g, ' ');

    /*
      Divide o texto em blocos a partir de cada "Período de ... até ..."
      Assim cada espelho é processado isoladamente.
    */
    const periodRegex = /Per[ií]odo\s*de\s*\d{2}\.\d{2}\.\d{4}\s*at[eé]\s*\d{2}\.\d{2}\.\d{4}/gi;
    const matches = [...normalizedText.matchAll(periodRegex)];

    // Se não encontrou períodos, não há como montar datas
    if (!matches.length) return map;

    const sections = [];
    for (let i = 0; i < matches.length; i++) {
        const start = matches[i].index;
        const end = (i + 1 < matches.length) ? matches[i + 1].index : normalizedText.length;
        sections.push(normalizedText.slice(start, end));
    }

    for (const section of sections) {
        parseSection(section, map);
    }

    return map;
}

/*
  Processa um único espelho de ponto.
*/
function parseSection(sectionText, globalMap) {
    const lines = sectionText.split('\n');

    let currentName = null;

    let periodStartDay = null;
    let periodStartMonth = null;
    let periodStartYear = null;

    let periodEndDay = null;
    let periodEndMonth = null;
    let periodEndYear = null;

    let rollingMonth = null;
    let rollingYear = null;
    let lastParsedDay = null;

    const rgName = /(Colaborador|Funcionário|Funcionario|Nome)\s*:\s*(.+)/i;
    const rgPeriod = /Per[ií]odo\s*de\s*(\d{2})\.(\d{2})\.(\d{4})\s*at[eé]\s*(\d{2})\.(\d{2})\.(\d{4})/i;
    const rgDay = /^\s*(\d{2})\s+(Seg|Ter|Qua|Qui|Sex|Sáb|Sab|Dom)\b/i;

    let insideGrid = false;

    for (const rawLine of lines) {
        const l = rawLine.trim();
        if (!l) continue;

        // ===== PERÍODO =====
        const mPeriod = l.match(rgPeriod);
        if (mPeriod) {
            periodStartDay = parseInt(mPeriod[1], 10);
            periodStartMonth = parseInt(mPeriod[2], 10);
            periodStartYear = parseInt(mPeriod[3], 10);

            periodEndDay = parseInt(mPeriod[4], 10);
            periodEndMonth = parseInt(mPeriod[5], 10);
            periodEndYear = parseInt(mPeriod[6], 10);

            rollingMonth = periodStartMonth;
            rollingYear = periodStartYear;
            lastParsedDay = null;

            continue;
        }

        // ===== NOME =====
        const mName = l.match(rgName);
        if (mName) {
            let raw = mName[2].trim();

            // aceita 00064828 - GILVAN BARBOSA DA SILVA
            // aceita 40000623-MURILOAUGUSTOFERRAZDUTRA
            raw = raw.replace(/^\d+\s*-\s*/, '').trim();

            currentName = raw.toUpperCase();

            if (!globalMap[currentName]) {
                globalMap[currentName] = [];
            }

            continue;
        }

        /*
          Detecta o início da grade principal.
          Só depois disso vamos aceitar linhas de dia.
        */
        if (/^Data\s+Dia\s+Regra/i.test(l)) {
            insideGrid = true;
            continue;
        }

        /*
          Ao chegar em blocos de histórico/rodapé, paramos de ler a grade.
        */
        if (/^Registros referentes/i.test(l)) {
            insideGrid = false;
            continue;
        }
        if (/^N[uú]mero do processo/i.test(l)) {
            insideGrid = false;
            continue;
        }
        if (/^N[uú]mero do documento/i.test(l)) {
            insideGrid = false;
            continue;
        }
        if (/^https?:\/\//i.test(l)) {
            insideGrid = false;
            continue;
        }
        if (/^Assinado eletronicamente/i.test(l)) {
            insideGrid = false;
            continue;
        }
        if (/^ID\./i.test(l)) {
            insideGrid = false;
            continue;
        }
        if (/^Fls\.\s*:/i.test(l)) {
            insideGrid = false;
            continue;
        }

        if (!insideGrid) continue;

        // ===== LINHAS DE DIA =====
        const mDay = l.match(rgDay);
        if (
            mDay &&
            currentName &&
            periodStartMonth !== null &&
            periodStartYear !== null &&
            periodEndMonth !== null &&
            periodEndYear !== null
        ) {
            const day = parseInt(mDay[1], 10);
            let realMonth;
            let realYear;

            // mesmo mês
            if (
                periodStartMonth === periodEndMonth &&
                periodStartYear === periodEndYear
            ) {
                realMonth = periodStartMonth;
                realYear = periodStartYear;
            } else {
                // espelho corrido: quando o dia "reinicia", avança o mês
                if (lastParsedDay !== null && day < lastParsedDay) {
                    rollingMonth += 1;
                    if (rollingMonth > 12) {
                        rollingMonth = 1;
                        rollingYear += 1;
                    }
                }

                realMonth = rollingMonth;
                realYear = rollingYear;
            }

            lastParsedDay = day;

            const allTimes = l.match(/\d{2}:\d{2}/g) || [];
            let realTimes = [];

            // Verifica estruturalmente se a linha possui o bloco de horário planejado (ex: FIX046A 22:45 07:05)
            const temHorarioPlanejado = /^\s*\d{2}\s+(Seg|Ter|Qua|Qui|Sex|Sáb|Sab|Dom)\s+\S+\s+\d{2}:\d{2}\s+\d{2}:\d{2}/i.test(l);

            if (temHorarioPlanejado) {
                // Se tem horário planejado, ignora os dois primeiros
                realTimes = allTimes.slice(2);
            } else {
                // Dias de DSR ou FOLGA pura não possuem a dupla de horários após a regra
                realTimes = allTimes;
            }

            const entryDate = new Date(realYear, realMonth - 1, day);
            const endDate = new Date(periodEndYear, periodEndMonth - 1, periodEndDay);

            if (entryDate <= endDate) {
                const isOffDay = /FOLGA|DSR|FERIADO/i.test(l);

                globalMap[currentName].push({
                   data: entryDate,
                   times: realTimes,
                   rawLine: l,
                   isOffDay: isOffDay
    });
}
        }
    }
}

    /*
      Ajusta batidas entre dias consecutivos.
      Essa função já existia no seu código e foi mantida.

      O que ela faz:
      - se o dia atual ficou com quantidade ímpar de batidas,
        ela pode "puxar" a primeira batida do dia seguinte;
      - se o dia já está fechado, ainda assim pode puxar
        uma batida do dia seguinte se o intervalo for curto
        e a próxima batida ocorrer cedo.

      Além disso:
      - quando puxa a batida do dia seguinte, soma 24 horas
        para representar virada noturna no mesmo dia-base.
    */
    
function isNextCalendarDay(a, b) {
    // Utiliza UTC para evitar falhas em dias de transição do Horário de Verão
    const d1 = Date.UTC(a.getFullYear(), a.getMonth(), a.getDate());
    const d2 = Date.UTC(b.getFullYear(), b.getMonth(), b.getDate());
    return (d2 - d1) === 24 * 60 * 60 * 1000;
}

function add24ToTime(hhmm) {
    const [h, m] = hhmm.split(':').map(Number);
    return `${h + 24}:${String(m).padStart(2, '0')}`;
}

function adjustShifts(timeline) {
    // Garante ordem das datas
    timeline.sort((a, b) => a.data - b.data);

    // Ordena horários dentro de cada dia
    timeline.forEach(day => {
        day.times = (day.times || []).slice().sort((a, b) => toMin(a) - toMin(b));
    });

    // PASSO 0: Separar madrugadas que formam pattern nonsense
    // Se um dia começa com madrugada (< 12h) e tem noturna (>= 12h) depois,
    // as madrugadas devem IR para o dia anterior
    // TAMBÉM: Se dia tem APENAS madrugadas (sem noturnas), vai para dia anterior
    for (let i = 1; i < timeline.length; i++) {
        const today = timeline[i];
        const yesterday = timeline[i - 1];

        if (!isNextCalendarDay(yesterday.data, today.data)) continue;
        if (!today.times.length) continue;

        // Separa madrugadas (< 12h) e noturnas (>= 12h)
        const morningTimes = [];  // < 12h (madrugada)
        const nightTimes = [];    // >= 12h (noturna)

        for (const t of today.times) {
            const mins = toMin(t);
            const hour = Math.floor(mins / 60);
            if (hour < 12) {
                morningTimes.push(t);
            } else {
                nightTimes.push(t);
            }
        }

        // CASO 1: tem AMBAS (madrugadas E noturnas), as madrugadas vão para ontem
        // CASO 2: tem APENAS madrugadas (e hoje é DSR ou sem turno), as madrugadas vão para ontem
        if (morningTimes.length > 0 && (nightTimes.length > 0 || today.isOffDay)) {
            // Move madrugadas para o dia anterior com +24h
            const movedTimes = morningTimes.map(t => add24ToTime(t));
            yesterday.times = [...(yesterday.times || []), ...movedTimes];
            yesterday.times.sort((a, b) => toMin(a) - toMin(b));
            
            // Deixa apenas noturnas em hoje (ou nada, se for DSR)
            today.times = nightTimes;
        }
    }

    for (let i = 0; i < timeline.length - 1; i++) {
        const today = timeline[i];
        const tomorrow = timeline[i + 1];

        if (!isNextCalendarDay(today.data, tomorrow.data)) continue;
        if (!today.times.length || !tomorrow.times.length) continue;

        let changed = true;

        while (changed) {
            changed = false;

            const todayOdd = today.times.length % 2 !== 0;
            const tomorrowOdd = tomorrow.times.length % 2 !== 0;

            if (!todayOdd || !tomorrow.times.length) break;

            const lastToday = today.times[today.times.length - 1];
            const firstTomorrow = tomorrow.times[0];

            const lastTodayMin = toMin(lastToday);
            const firstTomorrowMin = toMin(firstTomorrow);

            /*
              REGRA FORTE:
              Se hoje está ímpar e amanhã também está ímpar,
              é um ótimo indício de jornada noturna quebrada entre os dois dias.
              Então puxamos a primeira batida de amanhã para fechar hoje.
            */
            if (todayOdd && tomorrowOdd) {
                tomorrow.times.shift();
                today.times.push(add24ToTime(firstTomorrow));
                changed = true;
                continue;
            }

            /*
              REGRA SECUNDÁRIA:
              Hoje está ímpar, amanhã está par.
              Ainda pode ser que a 1ª batida de amanhã feche hoje,
              principalmente se:
              - a batida de amanhã for "menor" que a última de hoje (madrugada)
              - ou a distância total for razoável
            */
            if (todayOdd && !tomorrowOdd) {
                const hoursGap = ((firstTomorrowMin + 24 * 60) - lastTodayMin) / 60;

                const looksLikeNightClosure =
                    firstTomorrowMin < lastTodayMin || hoursGap <= 14;

                if (looksLikeNightClosure) {
                    tomorrow.times.shift();
                    today.times.push(add24ToTime(firstTomorrow));
                    changed = true;
                    continue;
                }
            }
        }
    }

    return timeline;
}
    /*
      Monta as semanas de um mês calendário.
      Regras:
      - semana sempre é Seg→Dom;
      - se a semana atravessar outro mês, ela é cortada;
      - assim, cada card mensal mostra só dias daquele mês.
    */
    function buildWeeksForMonth(year, monthIndex) {
        const firstDay = new Date(year, monthIndex, 1);
        const lastDay = new Date(year, monthIndex + 1, 0);

        const weeks = new Map();

        for (let d = new Date(firstDay); d <= lastDay; d = addDays(d, 1)) {
            const mon = mondayOf(d);
            const key = mon.toISOString().slice(0, 10);
            if (!weeks.has(key)) weeks.set(key, { mon, days: [] });
        }

        for (const w of weeks.values()) {
            const days = [];
            for (let i = 0; i < 7; i++) {
                const day = addDays(w.mon, i);
                if (day.getFullYear() === year && day.getMonth() === monthIndex) {
                    days.push(day);
                }
            }
            w.days = days;
        }

        return Array.from(weeks.values()).sort((a, b) => a.mon - b.mon);
    }

    /*
      Gera o texto TSV de uma semana para copiar e colar no Excel.
      Cada linha representa um dia.
      Cada coluna representa uma batida.
      Exemplo:
      06:00   10:00   11:00   15:48
      06:01   10:00   11:00   15:50

      O TSV usa TAB entre colunas e quebra de linha entre dias.
    */
    function toTSVForWeek(weekDays, daysMap) {
        let maxCols = 0;
        const rows = [];

        weekDays.forEach(d => {
            const key = fmtBRDate(d);
            const times = (daysMap.get(key) || []).slice();

            // Garante quantidade par de batidas
            if (times.length % 2 !== 0) times.push("");

            maxCols = Math.max(maxCols, times.length);
            rows.push(times);
        });

        return rows.map(times => {
            const cols = times.slice();
            while (cols.length < maxCols) cols.push("");
            return cols.join("\t");
        }).join("\n");
    }

    /*
      Copia texto para a área de transferência.
      Primeiro tenta navigator.clipboard.
      Se falhar, usa textarea temporária como fallback.
    */
    async function copyToClipboard(text) {
        try {
            await navigator.clipboard.writeText(text);
        } catch (e) {
            const ta = document.createElement("textarea");
            ta.value = text;
            ta.style.position = "fixed";
            ta.style.left = "-9999px";
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
        }
    }

    /*
      Renderiza o resultado de um funcionário.
      Estrutura final:
      - funcionário
        - mês calendário
          - semanas Seg→Dom
            - tabela de batidas
            - botão "Copiar semana"

      Importante:
      - aqui a exibição é por mês real da data;
      - ou seja, janeiro mostra 01 a 31 de janeiro, fevereiro mostra 01 a 28/29 etc.
    */
    function renderPerson(name, timeline, container) {
        const block = document.createElement('div');
        block.className = 'result-block';
        block.innerHTML = `<div class="person-name">${name}</div>`;

        const monthGroups = new Map();

        // Agrupa os dias por mês calendário real
        timeline.forEach(item => {
            const date = item.data;
            const year = date.getFullYear();
            const month = date.getMonth();
            const monthKey = `${year}-${String(month + 1).padStart(2, '0')}`;

            if (!monthGroups.has(monthKey)) {
                monthGroups.set(monthKey, {
                    year,
                    month,
                    daysMap: new Map()
                });
            }

            const g = monthGroups.get(monthKey);
            const dayKey = fmtBRDate(date);

            const times = (item.times || []).slice().sort((a, b) => toMin(a) - toMin(b));
            g.daysMap.set(dayKey, times);
        });

        Array.from(monthGroups.keys()).sort().forEach(monthKey => {
            const g = monthGroups.get(monthKey);
            const weeks = buildWeeksForMonth(g.year, g.month);

            const monthName = new Date(g.year, g.month, 1).toLocaleDateString('pt-BR', {
                month: 'long',
                year: 'numeric'
            });

            const lastDayOfMonth = new Date(g.year, g.month + 1, 0).getDate();

            const card = document.createElement('div');
            card.className = 'month-card';

            const header = document.createElement('div');
            header.className = 'card-header';
            header.innerHTML = `
                <div>
                    <div class="month-label">${monthName}</div>
                    <div class="month-meta">Dias do mês: 01 até ${String(lastDayOfMonth).padStart(2, '0')}</div>
                </div>
            `;
            card.appendChild(header);

            const weeksWrap = document.createElement('div');
            weeksWrap.className = 'weeks';

            weeks.forEach(w => {
                if (!w.days.length) return;

                const start = w.days[0];
                const end = w.days[w.days.length - 1];
                const title = `Semana ${fmtBRDate(start)} a ${fmtBRDate(end)}`;

                const weekBox = document.createElement('div');
                weekBox.className = 'week';

                const weekHead = document.createElement('div');
                weekHead.className = 'weekhead';

                const weekTitle = document.createElement('div');
                weekTitle.className = 'weektitle';
                weekTitle.textContent = title;

                const btn = document.createElement('button');
                btn.className = 'btn-copy';
                btn.type = 'button';
                btn.textContent = 'Copiar semana';

                const tsv = toTSVForWeek(w.days, g.daysMap);

                btn.addEventListener('click', async () => {
                    await copyToClipboard(tsv);
                    const old = btn.textContent;
                    btn.textContent = 'Copiado!';
                    btn.classList.add('copied');
                    setTimeout(() => {
                        btn.textContent = old;
                        btn.classList.remove('copied');
                    }, 2000);
                });

                weekHead.appendChild(weekTitle);
                weekHead.appendChild(btn);

                const table = document.createElement('table');
                table.className = 'tbl';

                const tbody = document.createElement('tbody');

                // Descobre quantas colunas de horário a semana precisa ter
                let maxCols = 0;
                w.days.forEach(d => {
                    const times = (g.daysMap.get(fmtBRDate(d)) || []).slice();
                    const len = times.length % 2 === 0 ? times.length : times.length + 1;
                    maxCols = Math.max(maxCols, len);
                });

                // Cria uma linha por dia da semana
                w.days.forEach(d => {
                    const key = fmtBRDate(d);
                    const times = (g.daysMap.get(key) || []).slice();

                    if (times.length % 2 !== 0) times.push("");
                    while (times.length < maxCols) times.push("");

                    const tr = document.createElement('tr');

                    times.forEach(t => {
                        const td = document.createElement('td');
                        td.textContent = t || "";
                        tr.appendChild(td);
                    });

                    tbody.appendChild(tr);
                });

                table.appendChild(tbody);
                weekBox.appendChild(weekHead);
                weekBox.appendChild(table);
                weeksWrap.appendChild(weekBox);
            });

            card.appendChild(weeksWrap);
            block.appendChild(card);
        });

        container.appendChild(block);
    }
</script>
